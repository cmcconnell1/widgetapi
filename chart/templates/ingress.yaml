apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: widgetapi
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx  # ✅ Ensure it's using the right Ingress Controller
    cert-manager.io/cluster-issuer: selfsigned-issuer
spec:
  ingressClassName: "nginx"  # ✅ Ensure correct ingress class
  rules:
  - host: widgetapi.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: widgetapi
            port:
              number: 8080

  tls:
    - hosts:
        - widgetapi.local
      secretName: widgetapi-tls
