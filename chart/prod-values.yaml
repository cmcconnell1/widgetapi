# For AWS Prod EKS, we increase replicas, enable stricter security, and enforce larger resource allocations.

# normally this would be higher but not for this POC single replca service
replicaCount: 1

image:
  repository: mayth/simple-upload-server 
  #tag: prod-latest
  tag: b0e711dcdfe9be60ed20ef5447a20dbd42f467c7f16772c0581241f9e82ea9ec

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
  hosts:
    - host: widgetapi.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - widgetapi.example.com
      secretName: prod-wildcard-cert

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

persistence:
  enabled: true
  storageClass: gp2
  size: 50Gi

# secrets must be created in the same namespace as the deployment like this
#kubectl create secret generic db-credentials \
#  --namespace widgetapi-prod \
#  --from-literal=DATABASE_URL="postgres://user:pass@prod-db.widgetapi.example.com:5432/widgetapi"
env:
  LOG_LEVEL: "error"
  DATABASE_URL:
    secretKeyRef:
      name: db-credentials
      key: DATABASE_URL

environment:
  TOKEN: "sometoken"  # Ensure consistency in naming across templates
  UPLOAD_LIMIT: "500MB"
